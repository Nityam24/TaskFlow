services:
  mongo:
    image: mongo:7
    container_name: task-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: task-management

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:5000
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo-data:
